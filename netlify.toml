[build]
  command = "npm run build"
  publish = "dist"

# Firebase web config values (VITE_FIREBASE_*) are PUBLIC by design — they are
# shipped to every browser that loads the app. Security is enforced by
# Firestore rules and Firebase Auth's authorized-domains list, not by keeping
# these values secret. Netlify's secrets scanner otherwise false-positives on
# VITE_FIREBASE_PROJECT_ID because the project ID matches the package name.
# See: https://firebase.google.com/docs/projects/api-keys
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MEASUREMENT_ID"
